<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Interview Portal | Prudential</title>
    <style>
        /* Reuse of your branding identity */
        body {
            background: linear-gradient(135deg, rgba(160, 20, 30, 0.5) 0%, rgba(110, 10, 20, 0.65) 100%), 
                        url('https://images.pexels.com/photos/6646914/insurance-concept-with-couple-family-house-car-wooden-blocks/6646914.jpg?auto=compress&cs=tinysrgb&w=1600&h=900&fit=crop');
            background-size: cover;
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 50px 0;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { color: #B71C1C; font-weight: 800; }
        .applicant-info { background: #f8f9fa; padding: 15px; border-left: 5px solid #B71C1C; margin-bottom: 20px; }
        
        .btn-save {
            background: linear-gradient(105deg, #B71C1C 0%, #D32F2F 100%);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 glass-container">
                <h2>Conduct Interview</h2>
                <hr>
                
                <div class="applicant-info">
                    <h5><strong>Applicant:</strong> {{ applicant.full_name }}</h5>
                    <p class="mb-0"><strong>NIN:</strong> {{ applicant.nin }} | <strong>Location:</strong> {{ applicant.cbhi.name }}</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Interview Conducted Date</label>
                        {{ form.interview_date_conducted }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Income Bracket</label>
                        {{ form.income_bracket }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Survey Notes / Observations</label>
                        {{ form.survey_notes }}
                    </div>

                    <div class="mb-3 form-check">
                        {{ form.interview_completed }}
                        <label class="form-check-label">Mark Interview as Completed</label>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-save">Save Interview Results</button>
                        <a href="{% url 'marketing_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
