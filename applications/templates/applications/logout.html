<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out | Prudential</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>

        :root{
            --primary:#B71C1C;
            --primary-light:#d32f2f;
            --bg:#f5f7fb;
            --text:#111827;
            --muted:#6b7280;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:var(--bg);
            overflow:hidden;
            font-family:'Inter',sans-serif;
            position:relative;
            padding:20px;
        }

        /* =========================
           BACKGROUND EFFECTS
        ========================== */

        .orb{
            position:absolute;
            border-radius:50%;
            filter:blur(120px);
            opacity:.18;
            z-index:0;
        }

        .orb1{
            width:420px;
            height:420px;
            background:#ff4d4d;
            top:-120px;
            left:-120px;
        }

        .orb2{
            width:350px;
            height:350px;
            background:#B71C1C;
            bottom:-100px;
            right:-100px;
        }

        .grid-overlay{
            position:absolute;
            inset:0;
            background-image:
                linear-gradient(rgba(0,0,0,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,.03) 1px, transparent 1px);
            background-size:40px 40px;
            mask-image:radial-gradient(circle at center, black 20%, transparent 80%);
            z-index:0;
        }

        /* =========================
           LOGOUT CARD
        ========================== */

        .logout-card{
            width:100%;
            max-width:480px;
            position:relative;
            z-index:2;

            background:rgba(255,255,255,.68);
            backdrop-filter:blur(24px);

            border:1px solid rgba(255,255,255,.45);

            border-radius:36px;

            padding:50px 40px;

            text-align:center;

            box-shadow:
                0 25px 55px rgba(0,0,0,.06),
                inset 0 1px 0 rgba(255,255,255,.5);

            overflow:hidden;

            animation:fadeUp .7s ease;
        }

        .logout-card::before{
            content:"";
            position:absolute;
            width:220px;
            height:220px;
            background:rgba(183,28,28,.05);
            border-radius:50%;
            top:-70px;
            right:-70px;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* =========================
           ICON
        ========================== */

        .logout-icon{
            width:90px;
            height:90px;
            margin:0 auto 28px;

            border-radius:28px;

            background:linear-gradient(
                135deg,
                var(--primary),
                var(--primary-light)
            );

            display:flex;
            align-items:center;
            justify-content:center;

            box-shadow:0 18px 35px rgba(183,28,28,.25);
        }

        .logout-icon svg{
            fill:white;
        }

        /* =========================
           TEXT
        ========================== */

        h2{
            font-size:2.2rem;
            font-weight:900;
            color:var(--text);
            letter-spacing:-1px;
            margin-bottom:14px;
        }

        p{
            color:var(--muted);
            font-size:1.02rem;
            line-height:1.8;
            margin-bottom:35px;
        }

        /* =========================
           BUTTONS
        ========================== */

        .btn-main{
            background:linear-gradient(
                135deg,
                var(--primary),
                var(--primary-light)
            );

            border:none;
            color:white;

            padding:15px 28px;

            border-radius:16px;

            font-weight:700;

            width:100%;

            transition:.35s ease;

            box-shadow:0 12px 25px rgba(183,28,28,.22);
        }

        .btn-main:hover{
            transform:translateY(-3px);
            color:white;
        }

        .btn-home{
            margin-top:16px;

            width:100%;

            padding:14px 28px;

            border-radius:16px;

            background:white;

            border:1px solid #e5e7eb;

            color:var(--text);

            font-weight:700;

            text-decoration:none;

            display:inline-block;

            transition:.35s ease;
        }

        .btn-home:hover{
            transform:translateY(-3px);
            box-shadow:0 15px 35px rgba(0,0,0,.06);
            color:var(--text);
        }

        /* =========================
           FOOTER TAG
        ========================== */

        .footer-tag{
            position:fixed;
            right:24px;
            bottom:20px;

            background:linear-gradient(
                135deg,
                var(--primary),
                var(--primary-light)
            );

            color:white;

            padding:12px 18px;

            border-radius:50px;

            font-size:.9rem;

            font-weight:700;

            box-shadow:0 12px 25px rgba(183,28,28,.2);

            z-index:10;
        }

        /* =========================
           RESPONSIVE
        ========================== */

        @media(max-width:576px){

            .logout-card{
                padding:40px 25px;
            }

            h2{
                font-size:1.8rem;
            }

        }

    </style>
</head>

<body>

    <!-- Background -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="grid-overlay"></div>

    <!-- Logout Card -->
    <div class="logout-card">

        <!-- Icon -->
        <div class="logout-icon">

            <svg xmlns="http://www.w3.org/2000/svg"
                 width="42"
                 height="42"
                 viewBox="0 0 16 16">

                <path fill-rule="evenodd"
                    d="M10 12a.5.5 0 0 1 .5.5v1A1.5
                    1.5 0 0 1 9 15H3a1.5 1.5 0 0
                    1-1.5-1.5v-11A1.5 1.5 0 0
                    1 3 1h6a1.5 1.5 0 0 1
                    1.5 1.5v1a.5.5 0 0
                    1-1 0v-1A.5.5 0 0 0
                    9 2H3a.5.5 0 0 0-.5.5v11A.5.5
                    0 0 0 3 14h6a.5.5 0 0 0
                    .5-.5v-1A.5.5 0 0 1 10 12"/>

                <path fill-rule="evenodd"
                    d="M15.854 8.354a.5.5 0 0
                    0 0-.708l-3-3a.5.5 0 1
                    0-.708.708L14.293 7.5H5.5a.5.5
                    0 0 0 0 1h8.793l-2.147
                    2.146a.5.5 0 0 0
                    .708.708z"/>

            </svg>

        </div>

        <!-- Content -->
        <h2>Logged Out Successfully</h2>

        <p>
            You have securely exited the Prudential Community Health
            Shield platform. Your session has ended successfully.
        </p>

        <!-- Buttons -->
        <a href="{% url 'login' %}" class="btn btn-main">
            Return to Login
        </a>

        <a href="/" class="btn-home">
            Back to Home
        </a>

    </div>

    <!-- Footer Tag -->
    <div class="footer-tag">
        🔴 Prudential Secure Access
    </div>

</body>
</html>
